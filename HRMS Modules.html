<html lang="th">
<head>
<meta charset="utf-8"/>
<title>HRMS · 4 Modules × 5 Personas (Time = Darwinbox style)</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="prod-tokens.css"/>

<style>

</style>
<!-- Money masking runtime (default: ALL currency values blurred until user toggles) -->
<script src="money-mask.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="prod-icons.jsx"></script>

<script type="text/babel" src="db-time-1.jsx"></script>

<script type="text/babel" src="prod-shell.jsx"></script>

<script type="text/babel" src="prod-hire.jsx"></script>
<script type="text/babel" src="prod-hire-clusters.jsx"></script>
<script type="text/babel" src="prod-probation.jsx"></script>
<script type="text/babel" src="prod-employee-detail.jsx"></script>
<script type="text/babel" src="mod-offboard.jsx"></script>

<script type="text/babel" src="mod-workforce.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard, TweaksPanel, TweakSection, TweakColor, TweakRadio, TweakToggle, useTweaks } = window;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "teal",
  "density": "regular",
  "dark": false
}/*EDITMODE-END*/;

const ACCENT_PALETTES = {
  teal:   { accent: "#1FA8A0", soft: "#D6EEEC" },
  indigo: { accent: "#5B6CE0", soft: "#E1E4FB" },
  forest: { accent: "#2F8A6B", soft: "#D1FAE5" },
  plum:   { accent: "#9333EA", soft: "#F3E8FF" },
};

function applyTweaks(t) {
  const root = document.documentElement;
  const p = ACCENT_PALETTES[t.accent] || ACCENT_PALETTES.teal;
  root.style.setProperty("--color-accent", p.accent);
  root.style.setProperty("--color-accent-soft", p.soft);
  root.style.setProperty("--color-brand", p.accent);
  root.style.setProperty("--color-brand-tint", p.soft);
  const scale = t.density === "compact" ? 0.92 : t.density === "comfy" ? 1.08 : 1;
  root.style.setProperty("--density-scale", scale);
}

const Wrap = ({ persona, nav, badge, children }) => (
  <window.PersonaShell persona={persona} activeNav={nav} pageBadge={badge}>{children}</window.PersonaShell>
);

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  React.useEffect(() => { applyTweaks(t); }, [t]);
  window.__TWEAKS = t;

  return (
    <>
      <DesignCanvas storageKey="hrms-modules-canvas">

        {/* ════════════════════════════════════════════════════════════════
            🏠  HOME & PROFILE — landing screens & employee identity
            ════════════════════════════════════════════════════════════════ */}
        <DCSection id="home" title="🏠 Home & Profile · landing + ทะเบียนพนักงาน + ผังองค์กร">
          <DCArtboard id="prod-home" label="P-1 · Employee — /th/home (Humi dashboard landing)" width={1280} height={1700}>
            <window.ProdShell page="home" persona="employee"><window.ProdHome/></window.ProdShell>
          </DCArtboard>
          <DCArtboard id="prod-emp-detail" label="P-5 · HR Admin — Employee Detail Hub (/admin/employees/[id]) · 9 actions" width={1280} height={2400}>
            <window.ProdShell page="admin" persona="admin"><window.EmployeeDetail/></window.ProdShell>
          </DCArtboard>
          <DCArtboard id="m1-emp"     label="1A · Employee — โปรไฟล์ของฉัน"            width={1280} height={1280}><Wrap persona="employee" nav="employee-center"><window.EC_Employee/></Wrap></DCArtboard>
          <DCArtboard id="m1-emp-org" label="1A+ · Employee — โปรไฟล์ → tab ผังองค์กร"  width={1280} height={1500}><Wrap persona="employee" nav="employee-center"><window.EC_Employee initialTab="org"/></Wrap></DCArtboard>
          <DCArtboard id="m1-mgr"     label="1B · Manager — ทีมของฉัน"                 width={1280} height={1000}><Wrap persona="manager"  nav="employee-center"><window.EC_Manager/></Wrap></DCArtboard>
          <DCArtboard id="m1-admin"   label="1C · HR Admin — ทะเบียนพนักงาน (list)"     width={1280} height={1100}><Wrap persona="admin"    nav="employee-center"><window.EC_Admin/></Wrap></DCArtboard>
          <DCArtboard id="m1-hris"    label="1D · HRIS — Master data"                  width={1280} height={1280}><Wrap persona="hris"     nav="employee-center"><window.EC_Hris/></Wrap></DCArtboard>
          <DCArtboard id="m1-spd"     label="1E · SPD — คิวตรวจเอกสาร"                 width={1280} height={1180}><Wrap persona="spd"      nav="employee-center"><window.EC_Spd/></Wrap></DCArtboard>
          <DCArtboard id="org-emp"   label="OC-A · Employee — ผังองค์กร"               width={1360} height={1500}><Wrap persona="employee" nav="org"><window.OrgChart_Standalone persona="employee"/></Wrap></DCArtboard>
          <DCArtboard id="org-mgr"   label="OC-B · Manager — focus หัวหน้ากะ + ลูกทีม" width={1360} height={1500}><Wrap persona="manager"  nav="org"><window.OrgChart_Standalone persona="manager"/></Wrap></DCArtboard>
          <DCArtboard id="org-admin" label="OC-C · HR Admin — focus Store Manager"     width={1360} height={1500}><Wrap persona="admin"    nav="org"><window.OrgChart_Standalone persona="admin"/></Wrap></DCArtboard>
          <DCArtboard id="org-hris"  label="OC-D · HRIS — focus CHRO ภาพรวมทั้งบริษัท" width={1360} height={1500}><Wrap persona="hris"     nav="org"><window.OrgChart_Standalone persona="hris"/></Wrap></DCArtboard>
        </DCSection>

        {/* ════════════════════════════════════════════════════════════════
            🔄  EMPLOYEE LIFECYCLE — Hire → Probation → Transfer → Resignation
            ════════════════════════════════════════════════════════════════ */}
        <DCSection id="lifecycle" title="🔄 Employee Lifecycle · Hire → Onboard → Probation → Transfer → Resignation">
          {/* — Hire Wizard (port from git) — */}
          <DCArtboard id="prod-hire-who" label="P-2a · HR Admin — Hire · Cluster 1: Who (ข้อมูลบุคคล)" width={1280} height={3400}>
            <window.ProdShell page="hire" persona="admin"><window.ProdHire startStep={1}/></window.ProdShell>
          </DCArtboard>
          <DCArtboard id="prod-hire-job" label="P-2b · HR Admin — Hire · Cluster 2: Job (ข้อมูลงาน)" width={1280} height={1800}>
            <window.ProdShell page="hire" persona="admin"><window.ProdHire startStep={2}/></window.ProdShell>
          </DCArtboard>
          <DCArtboard id="prod-hire-review" label="P-2c · HR Admin — Hire · Cluster 3: Review" width={1280} height={2400}>
            <window.ProdShell page="hire" persona="admin"><window.ProdHire startStep={3}/></window.ProdShell>
          </DCArtboard>
          {/* — Onboarding — */}
          <DCArtboard id="lc-onboard-emp" label="LC-7 · Employee — Onboarding (Day 1 → 90)" width={1360} height={1900}>
            <Wrap persona="employee" nav="home"><window.Onboarding_Day1/></Wrap>
          </DCArtboard>
          {/* — Probation — */}
          <DCArtboard id="prod-prob-inbox" label="P-3 · Manager — Probation Inbox (รายการรออนุมัติ)" width={1280} height={900}>
            <window.ProdShell page="team" persona="manager"><window.ProbationInbox/></window.ProdShell>
          </DCArtboard>
          <DCArtboard id="prod-prob-approve" label="P-4 · Manager — Probation Approve (รีวิวเคสเดี่ยว)" width={1280} height={2100}>
            <window.ProdShell page="team" persona="manager"><window.ProbationApprove/></window.ProdShell>
          </DCArtboard>
          <DCArtboard id="lc-confirm-admin" label="LC-8 · HR Admin — Confirmation Letter (after probation)" width={1360} height={1700}>
            <Wrap persona="admin" nav="employee-center"><window.Confirmation_Admin/></Wrap>
          </DCArtboard>
          {/* — Transfer — */}
          <DCArtboard id="lc-transfer-mgr" label="LC-5 · Manager — Approve Internal Transfer" width={1360} height={1700}>
            <Wrap persona="manager" nav="inbox" badge="1 ใหม่"><window.Transfer_Manager/></Wrap>
          </DCArtboard>
          <DCArtboard id="lc-transfer-admin" label="LC-6 · HR Admin — Transfer Workspace (checklist + letter)" width={1360} height={1700}>
            <Wrap persona="admin" nav="employee-center"><window.Transfer_Admin/></Wrap>
          </DCArtboard>
          {/* — Resignation — */}
          <DCArtboard id="lc-offboard-mgr" label="LC-2 · Manager — อนุมัติการลาออก (Approve Resignation)" width={1360} height={1500}>
            <Wrap persona="manager" nav="inbox" badge="1 ใหม่"><window.Offboard_Manager/></Wrap>
          </DCArtboard>
          <DCArtboard id="lc-offboard-admin" label="LC-3 · HR Admin — Offboarding Workspace (clearance + final pay)" width={1360} height={1800}>
            <Wrap persona="admin" nav="employee-center"><window.Offboard_AdminWorkspace/></Wrap>
          </DCArtboard>
          <DCArtboard id="lc-offboard-emp" label="LC-4 · Employee — Exit Interview Form" width={1360} height={2300}>
            <Wrap persona="employee" nav="requests"><window.Offboard_ExitInterview/></Wrap>
          </DCArtboard>
        </DCSection>

        {/* ════════════════════════════════════════════════════════════════
            📅  DAILY OPERATIONS — Time · Benefit · Payroll · Workforce
            ════════════════════════════════════════════════════════════════ */}
        <DCSection id="ops-time" title="📅 Time & Attendance · 5 personas (Darwinbox style)">
          <DCArtboard id="m3db-palette" label="3· Status Palette · ปรับชุดสีให้เข้ากับ Humi (warm cream)" width={1360} height={780}>
            <div style={{padding: 32, background:"var(--color-canvas, #F6F1E8)", minHeight:"100%"}}>
              <window.DbStatusPalette/>
            </div>
          </DCArtboard>
          <DCArtboard id="m3db-emp"   label="3A · Employee — My Attendance"             width={1360} height={1500}>
            <Wrap persona="employee" nav="time"><window.TM_Employee_DB/></Wrap>
          </DCArtboard>
          <DCArtboard id="m3db-emp-leave" label="3A-1 · Employee — Apply Leave (form)" width={1360} height={2000}>
            <Wrap persona="employee" nav="time"><window.TM_Employee_ApplyLeave/></Wrap>
          </DCArtboard>
          <DCArtboard id="m3db-mgr"   label="3B · Manager — Team Attendance + Workdesk" width={1360} height={1600}>
            <Wrap persona="manager"  nav="time" badge="5 actions"><window.TM_Manager_DB/></Wrap>
          </DCArtboard>
          <DCArtboard id="m3db-admin" label="3C · HR Admin — Org Dashboard (live)"      width={1360} height={1280}>
            <Wrap persona="admin"    nav="time"><window.TM_Admin_DB/></Wrap>
          </DCArtboard>
          <DCArtboard id="m3db-hris"  label="3D · HRIS — Attendance Policy Builder"     width={1360} height={1280}>
            <Wrap persona="hris"     nav="time"><window.TM_Hris_DB/></Wrap>
          </DCArtboard>
          <DCArtboard id="m3db-spd"   label="3E · SPD — Regularization Queue"           width={1360} height={1280}>
            <Wrap persona="spd"      nav="time"><window.TM_Spd_DB/></Wrap>
          </DCArtboard>
        </DCSection>

        <DCSection id="ops-benefit" title="📅 Benefit Claimed · 5 personas">
          <DCArtboard id="m2-emp"        label="2A · Employee — เบิกสวัสดิการ"               width={1280} height={1100}><Wrap persona="employee" nav="benefit"><window.BN_Employee/></Wrap></DCArtboard>
          <DCArtboard id="m2-mgr"        label="2B · Manager — อนุมัติเบิก"                  width={1280} height={1100}><Wrap persona="manager"  nav="benefit"><window.BN_Manager/></Wrap></DCArtboard>
          <DCArtboard id="m2-admin"      label="2C · HR Admin — ภาพรวม + คิวอนุมัติ"          width={1280} height={1080}><Wrap persona="admin"    nav="benefit"><window.BN_Admin/></Wrap></DCArtboard>
          <DCArtboard id="m2-admin-plan" label="2C+ · HR Admin — แผนสวัสดิการ + จัดสิทธิ"    width={1360} height={1900}><Wrap persona="admin"    nav="benefit"><window.BN_Admin initialView="plans"/></Wrap></DCArtboard>
          <DCArtboard id="m2-admin-rule" label="2C++ · HR Admin — เกณฑ์สิทธิ (Eligibility)"  width={1360} height={2000}><Wrap persona="admin"    nav="benefit"><window.BN_Admin initialView="rules"/></Wrap></DCArtboard>
          <DCArtboard id="m2-hris"       label="2D · HRIS — Master catalog (วงเงิน/กฎหลัก)"  width={1280} height={1280}><Wrap persona="hris"     nav="benefit"><window.BN_Hris/></Wrap></DCArtboard>
          <DCArtboard id="m2-spd"        label="2E · SPD — ตรวจเอกสาร"                       width={1280} height={1200}><Wrap persona="spd"      nav="benefit"><window.BN_Spd/></Wrap></DCArtboard>
        </DCSection>

        <DCSection id="ops-payroll" title="📅 Payroll · 5 personas">
          <DCArtboard id="m4-emp"   label="4A · Employee — สลิปเงินเดือน"             width={1280} height={1280}><Wrap persona="employee" nav="payroll"><window.PR_Employee/></Wrap></DCArtboard>
          <DCArtboard id="m4-mgr"   label="4B · Manager — Team Payroll"               width={1280} height={1100}><Wrap persona="manager"  nav="payroll"><window.PR_Manager/></Wrap></DCArtboard>
          <DCArtboard id="m4-admin" label="4C · HR Admin — Run Payroll"               width={1280} height={1200}><Wrap persona="admin"    nav="payroll"><window.PR_Admin/></Wrap></DCArtboard>
          <DCArtboard id="m4-hris"  label="4D · HRIS — Payroll config"                width={1280} height={1280}><Wrap persona="hris"     nav="payroll"><window.PR_Hris/></Wrap></DCArtboard>
          <DCArtboard id="m4-spd"   label="4E · SPD — ตรวจสอบ payroll"                width={1280} height={1200}><Wrap persona="spd"      nav="payroll"><window.PR_Spd/></Wrap></DCArtboard>
        </DCSection>

        {/* ════════════════════════════════════════════════════════════════
            🛡️  ADMIN TOOLS — Login as Person (single picker, Jira-style)
            ════════════════════════════════════════════════════════════════ */}
        <DCSection id="admin-loginas" title="🛡️ Admin Tools · Login as Person">
          <DCArtboard id="la-picker" label="LA · Login as Person — popover under ⚙️ gear (Jira-style)" width={1280} height={900}>
            <window.ProdShell page="admin" persona="admin"><window.LoginAs_Picker/></window.ProdShell>
          </DCArtboard>
        </DCSection>

        <DCSection id="ops-workforce" title="📅 Workforce · Retail operations (Roster · Swap · Asset)">
          <DCArtboard id="wf-roster" label="WF-1 · Manager — Weekly Roster Builder (กะการทำงาน)" width={1480} height={1400}>
            <Wrap persona="manager" nav="time"><window.Roster_Manager/></Wrap>
          </DCArtboard>
          <DCArtboard id="wf-swap" label="WF-2 · Manager — Shift Swap Approval (สลับกะ)" width={1360} height={1300}>
            <Wrap persona="manager" nav="inbox" badge="2 รออนุมัติ"><window.ShiftSwap_Manager/></Wrap>
          </DCArtboard>
          <DCArtboard id="wf-asset" label="WF-3 · HR Admin — Asset Management (เครื่องแบบ + IT + Badge)" width={1480} height={1500}>
            <Wrap persona="admin" nav="employee-center"><window.Asset_Admin/></Wrap>
          </DCArtboard>
        </DCSection>

      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Brand · สี"/>
        <TweakColor label="Accent" value={ACCENT_PALETTES[t.accent]?.accent || "#1FA8A0"}
                    options={["#1FA8A0","#5B6CE0","#2F8A6B","#9333EA"]}
                    onChange={hex => {
                      const key = Object.keys(ACCENT_PALETTES).find(k => ACCENT_PALETTES[k].accent === hex) || "teal";
                      setTweak("accent", key);
                    }}/>
        <TweakSection label="Layout"/>
        <TweakRadio label="ความหนาแน่น" value={t.density}
                    options={["compact","regular","comfy"]}
                    onChange={v => setTweak("density", v)}/>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
