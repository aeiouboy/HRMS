<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<title>Humi · Home User Journey Overview</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="prod-tokens.css"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  body { margin: 0; background: #1a1f29; font-family: 'CPN', 'Anuphan', system-ui, sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="prod-home-overview.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="home-overview"
                 title="🏠 Home · User Journey Overview (Pilot)"
                 subtitle="Storyboard 4 frames อธิบาย design rationale ของหน้า Home — Manager persona">
        <DCArtboard id="f1" label="01 · แรกเข้า · Greeting + Today" width={1500} height={760}>
          <window.HomeOverviewFrame1/>
        </DCArtboard>
        <DCArtboard id="f2" label="02 · รับข้อมูล · Organisational Updates" width={1500} height={760}>
          <window.HomeOverviewFrame2/>
        </DCArtboard>
        <DCArtboard id="f3" label="03 · ลงมือทำ · Approvals + เอกสารค้าง" width={1500} height={760}>
          <window.HomeOverviewFrame3/>
        </DCArtboard>
        <DCArtboard id="f4" label="04 · เชื่อมสัมพันธ์ · Announcements + Birthday" width={1500} height={760}>
          <window.HomeOverviewFrame4/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
